spring:
  profiles:
    default: local

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

logging:
  pattern:
    console: "[%d{yyyy-MM-dd HH:mm:ss}] [%level] [%thread] %logger - %msg%n"
  level:
    org.hibernate.SQL: debug
    org.hibernate.type.descriptor.sql: trace

springdoc:
  swagger-ui:
    path: /swagger-ui.html

