spring:
  datasource:
    url: jdbc:h2:mem:registration-test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
    open-in-view: false
  flyway:
    enabled: false
  session:
    jdbc:
      initialize-schema: never

logging:
  level:
    org.hibernate.SQL: warn
